name: Build and Package Windows App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Позволяет запускать сборку вручную через сайт GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt 6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.1'
        target: 'desktop'
        arch: 'win64_msvc2019_64'

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build Application
      shell: cmd
      run: |
        cd app
        qmake dryclean.pro CONFIG+=release
        nmake

    - name: Package Qt Dependencies (windeployqt)
      shell: pwsh
      run: |
        windeployqt --release app/release/dryclean.exe

    - name: Package PostgreSQL Client Dependencies
      shell: pwsh
      run: |
        # Динамически находим директорию предустановленного PostgreSQL и копируем библиотеки
        $pgPath = "C:\Program Files\PostgreSQL"
        if (Test-Path $pgPath) {
            $pgVersionDir = Get-ChildItem -Path $pgPath | Where-Object { $_.PSIsContainer } | Select-Object -First 1
            if ($pgVersionDir) {
                $pgBin = Join-Path $pgVersionDir.FullName "bin"
                Write-Host "Found PostgreSQL bin directory at: $pgBin"
                Get-ChildItem -Path $pgBin -Filter "*.dll" | Copy-Item -Destination "app/release/"
            } else {
                Write-Error "No PostgreSQL version directory found in $pgPath"
                exit 1
            }
        } else {
            Write-Error "PostgreSQL installation path $pgPath does not exist"
            exit 1
        }


        # Очищаем мусор компиляции (.obj, moc_*) из папки релиза, чтобы архив был чистым
        Remove-Item -Path "app/release/*.obj" -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "app/release/moc_*" -Force -ErrorAction SilentlyContinue

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dryclean-windows-x64
        path: app/release/


